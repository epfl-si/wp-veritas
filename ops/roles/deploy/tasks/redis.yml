- name: Create Redis PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ redis_name }}-data"
        namespace: "{{ inventory_hostname }}"
        labels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/component: redis
          app.kubernetes.io/part-of: "{{ app_name }}"
          app.kubernetes.io/managed-by: ansible
      spec:
        storageClassName: "ocs-storagecluster-cephfs"
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: 1Gi

- name: Deploy Redis Deployment
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ redis_name }}"
        namespace: "{{ inventory_hostname }}"
        labels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/component: redis
          app.kubernetes.io/part-of: "{{ app_name }}"
          app.kubernetes.io/managed-by: ansible
      spec:
        replicas: 1
        selector:
          matchLabels:
            app.kubernetes.io/component: redis
        template:
          metadata:
            labels:
              app.kubernetes.io/name: redis
              app.kubernetes.io/component: redis
              app.kubernetes.io/part-of: "{{ app_name }}"
              app.kubernetes.io/managed-by: ansible
          spec:
            serviceAccountName: "{{ app_name }}"
            containers:
              - name: redis
                image: "{{ quay_registry }}/redis:8.0.2"
                ports:
                  - containerPort: 6379
                    name: redis
                volumeMounts:
                  - name: redis-data
                    mountPath: /data
                resources:
                  limits:
                    memory: "128Mi"
                  requests:
                    memory: "128Mi"
                    cpu: "100m"
                livenessProbe:
                  tcpSocket:
                    port: 6379
                  initialDelaySeconds: 30
                  periodSeconds: 10
                readinessProbe:
                  tcpSocket:
                    port: 6379
                  initialDelaySeconds: 5
                  periodSeconds: 5
            volumes:
              - name: redis-data
                persistentVolumeClaim:
                  claimName: "{{ redis_name }}-data"

- name: Create Redis Service
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Service
      metadata:
        name: "{{ redis_name }}"
        namespace: "{{ inventory_hostname }}"
        labels:
          app.kubernetes.io/name: redis
          app.kubernetes.io/component: redis
          app.kubernetes.io/part-of: "{{ app_name }}"
          app.kubernetes.io/managed-by: ansible
      spec:
        type: ClusterIP
        ports:
          - port: 6379
            targetPort: 6379
            name: redis
        selector:
          app.kubernetes.io/component: redis
