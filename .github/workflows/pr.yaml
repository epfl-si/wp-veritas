name: Pull Request

on:
    pull_request:

jobs:
    prepare:
        name: Prepare
        runs-on: ubuntu-24.04
        outputs:
            tag: ${{ steps.compute.outputs.tag }}
        steps:
            - name: Compute image tag
              id: compute
              run: |
                  BRANCH=$(echo "${{ github.head_ref }}" | sed 's/[^a-zA-Z0-9._-]/-/g')
                  SHA="${{ github.sha }}"
                  echo "tag=quay-its.epfl.ch/svc0041/wp-veritas:${BRANCH}-${SHA:0:7}" >> $GITHUB_OUTPUT

    lint:
        uses: ./.github/workflows/_lint.yaml

    build:
        name: Build and Push
        needs: [prepare, lint]
        uses: ./.github/workflows/_build.yaml
        with:
            tags: ${{ needs.prepare.outputs.tag }}
        secrets: inherit
