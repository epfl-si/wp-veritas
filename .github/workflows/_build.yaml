name: Build

on:
    workflow_call:
        inputs:
            tags:
                type: string
                required: true
            version:
                type: string
                required: true
        secrets:
            QUAY_ROBOT_USERNAME:
                required: true
            QUAY_ROBOT_PASSWORD:
                required: true
        outputs:
            build_success:
                description: Whether the build and push succeeded
                value: ${{ jobs.build.outputs.build_success }}

jobs:
    build:
        name: Build and Push
        runs-on: ubuntu-24.04
        permissions:
            contents: read
            packages: write
        outputs:
            build_success: ${{ steps.result.outputs.success }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set version in package.json
              run: jq --arg v "${{ inputs.version }}" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json

            - name: Setup Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Login to Quay
              uses: docker/login-action@v4
              with:
                  registry: quay-its.epfl.ch
                  username: ${{ secrets.QUAY_ROBOT_USERNAME }}
                  password: ${{ secrets.QUAY_ROBOT_PASSWORD }}

            - name: Build and push
              uses: docker/build-push-action@v7
              with:
                  context: .
                  push: true
                  tags: ${{ inputs.tags }}
                  platforms: linux/amd64
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Mark build success
              id: result
              run: echo "success=true" >> $GITHUB_OUTPUT
